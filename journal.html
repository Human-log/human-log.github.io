<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal Entry — Human.Log</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; color: #00ff41; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .form-group input, .form-group textarea {
      width: 100%; background: #0a0a0a; border: 1px solid #008f11;
      color: #00ff41; font-family: inherit; font-size: 1rem; padding: 0.5rem;
      outline: none;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: #00ff41; box-shadow: 0 0 10px rgba(0,255,65,0.3);
    }
    .form-group textarea { min-height: 200px; resize: vertical; }
    .mood-row { display: flex; gap: 0.5rem; align-items: center; }
    .mood-row input[type=range] { flex: 1; accent-color: #00ff41; height: 4px; }
    .mood-value { font-size: 1.5rem; min-width: 3rem; text-align: center; }
    .time-table { width: 100%; border-collapse: collapse; }
    .time-table td { border: 1px solid #008f11; padding: 0.5rem; }
    .time-table input { background: #0a0a0a; border: none; color: #00ff41; font-family: inherit; font-size: 1rem; width: 100%; outline: none; }
    .btn-row { display: flex; gap: 1rem; margin-top: 1rem; }
    .btn-save, .btn-publish {
      background: transparent; border: 1px solid #00ff41; color: #00ff41;
      font-family: inherit; font-size: 1.1rem; padding: 0.8rem 2rem;
      cursor: pointer; letter-spacing: 0.1em; text-align: center;
    }
    .btn-save:hover, .btn-publish:hover { background: rgba(0,255,65,0.1); box-shadow: 0 0 15px rgba(0,255,65,0.3); }
    .btn-publish { border-color: #ffcc00; color: #ffcc00; }
    .btn-publish:hover { background: rgba(255,204,0,0.1); box-shadow: 0 0 15px rgba(255,204,0,0.3); }
    .btn-download { border-color: #008f11; color: #008f11; }
    .status-msg { margin-top: 1rem; padding: 0.5rem; border: 1px solid #008f11; display: none; text-align: center; }
    .status-msg.show { display: block; }
    .status-msg.success { border-color: #00ff41; color: #00ff41; }
    .status-msg.error { border-color: #ff4444; color: #ff4444; }
    .server-badge { display: none; border: 1px solid #ffcc00; color: #ffcc00; padding: 0.3rem 0.5rem; font-size: 0.75rem; margin-bottom: 1rem; }
    .server-badge.show { display: inline-block; }
  </style>
</head>
<body>
  <canvas id="matrix-canvas"></canvas>
  <div class="container">
    <header>
      <h1>>_Human.Log<span>_</span></h1>
      <div class="tagline">$ tail -f /var/log/life</div>
      <nav><a href="index.html">~/home</a> <a href="tracker.html">~/moods</a></nav>
    </header>

    <div class="status-bar" id="status-bar"></div>
    <div class="server-badge" id="server-badge">LIVE SERVER MODE</div>
    <h2 style="margin-bottom:1.5rem">> New Journal Entry</h2>

    <form id="journal-form">
      <div class="form-group">
        <label>> Date</label>
        <input type="date" id="entry-date">
      </div>

      <div class="form-group">
        <label>> Mood (1-10)</label>
        <div class="mood-row">
          <input type="range" id="mood" min="1" max="10" value="7">
          <span class="mood-value" id="mood-display">7</span>
        </div>
      </div>

      <div class="form-group">
        <label>> Entry Title</label>
        <input type="text" id="entry-title" placeholder="e.g. A Quiet Tuesday">
      </div>

      <div class="form-group">
        <label>> Sleep & Wake</label>
        <table class="time-table">
          <tr><td>Wake up time</td><td><input type="time" id="wakeup"></td></tr>
          <tr><td>Sleep time</td><td><input type="time" id="sleeptime"></td></tr>
        </table>
      </div>

      <div class="form-group">
        <label>> About My Day</label>
        <textarea id="about-day" placeholder="Write about your day..."></textarea>
      </div>

      <div class="btn-row">
        <button type="button" class="btn-save" id="save-btn">[ SAVE ]</button>
        <button type="button" class="btn-save btn-download" id="download-btn">[ DOWNLOAD ]</button>
        <button type="button" class="btn-publish" id="publish-btn">[ PUBLISH ]</button>
      </div>
    </form>

    <div class="status-msg" id="status-msg"></div>

    <footer style="margin-top:3rem">
      <p>Run <strong>start-journal.ps1</strong> for auto-save &amp; publish, or open journal.html directly to download .md files</p>
    </footer>
  </div>

  <script src="js/matrix-rain.js"></script>
  <script>
    const now = new Date();
    document.getElementById('status-bar').textContent = 'NEW ENTRY // ' + now.toISOString().split('T')[0];

    const moodSlider = document.getElementById('mood');
    const moodDisplay = document.getElementById('mood-display');
    const dateInput = document.getElementById('entry-date');
    dateInput.value = now.toISOString().split('T')[0];

    moodSlider.addEventListener('input', () => {
      moodDisplay.textContent = moodSlider.value;
    });

    function generateMarkdown() {
      const date = dateInput.value;
      const mood = moodSlider.value;
      const title = document.getElementById('entry-title').value || 'Journal Entry - ' + date;
      const wakeup = document.getElementById('wakeup').value;
      const sleeptime = document.getElementById('sleeptime').value;
      const about = document.getElementById('about-day').value;

      let md = '# ' + title + '\n';
      md += 'Date: ' + date + '\n';
      md += 'Mood: ' + mood + '/10\n';
      if (wakeup) md += 'Wake: ' + wakeup + '\n';
      if (sleeptime) md += 'Sleep: ' + sleeptime + '\n';
      md += '\n';
      if (about) md += about + '\n\n';
      return md;
    }

    function getSlug(title, date) {
      const base = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'entry';
      return date + '-' + base;
    }

    const apiUrl = typeof API_URL !== 'undefined' ? API_URL : null;
    if (apiUrl) {
      document.getElementById('server-badge').classList.add('show');
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status-msg');
      el.textContent = msg;
      el.className = 'status-msg show ' + (type || '');
      setTimeout(() => el.classList.remove('show'), 5000);
    }

    document.getElementById('save-btn').addEventListener('click', () => {
      const md = generateMarkdown();
      const slug = getSlug(document.getElementById('entry-title').value || 'untitled', dateInput.value);

      if (apiUrl) {
        fetch(apiUrl + '/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'slug=' + encodeURIComponent(slug) + '&content=' + encodeURIComponent(md)
        }).then(r => r.json()).then(d => {
          showStatus('Saved as ' + d.file, 'success');
        }).catch(() => {
          showStatus('Failed to save', 'error');
        });
      } else {
        const blob = new Blob([md], { type: 'text/markdown' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = slug + '.md';
        a.click();
        URL.revokeObjectURL(a.href);
        showStatus('File downloaded. Move it to the posts/ folder.', 'success');
      }
    });

    document.getElementById('download-btn').addEventListener('click', () => {
      const md = generateMarkdown();
      const slug = getSlug(document.getElementById('entry-title').value || 'untitled', dateInput.value);
      const blob = new Blob([md], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = slug + '.md';
      a.click();
      URL.revokeObjectURL(a.href);
      showStatus('File downloaded.', 'success');
    });

    document.getElementById('publish-btn').addEventListener('click', () => {
      if (!apiUrl) {
        showStatus('Open via start-journal.ps1 to use auto-publish', 'error');
        return;
      }
      fetch(apiUrl + '/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'slug=' + encodeURIComponent(getSlug(document.getElementById('entry-title').value || 'untitled', dateInput.value)) + '&content=' + encodeURIComponent(generateMarkdown())
      }).then(r => r.json()).then(() => {
        return fetch(apiUrl + '/publish', { method: 'POST' });
      }).then(r => r.json()).then(d => {
        if (d.published) showStatus('Saved and published to GitHub!', 'success');
      }).catch(() => {
        showStatus('Failed to publish', 'error');
      });
    });
  </script>
</body>
</html>
