<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood Tracker — Human.Log</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .cal-nav button { background: transparent; border: 1px solid #008f11; color: #00ff41; font-family: inherit; font-size: 1.2rem; padding: 0.3rem 1rem; cursor: pointer; }
    .cal-nav button:hover { border-color: #00ff41; box-shadow: 0 0 10px rgba(0,255,65,0.3); }
    .cal-nav span { font-size: 1.3rem; letter-spacing: 0.1em; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-header { text-align: center; font-size: 0.75rem; color: #008f11; padding: 0.5rem 0; }
    .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #0a0a0a; font-size: 0.8rem; position: relative; }
    .cal-day .day-num { font-size: 0.9rem; }
    .cal-day .mood-badge { font-size: 0.7rem; margin-top: 2px; }
    .cal-day.empty { border-color: transparent; }
    .cal-day.has-entry { border-color: #008f11; cursor: pointer; }
    .cal-day.has-entry:hover { border-color: #00ff41; }
    .mood-1 { background: rgba(255,0,0,0.25); } .mood-2 { background: rgba(255,30,0,0.25); }
    .mood-3 { background: rgba(255,60,0,0.25); } .mood-4 { background: rgba(255,120,0,0.2); }
    .mood-5 { background: rgba(255,180,0,0.2); } .mood-6 { background: rgba(200,255,0,0.2); }
    .mood-7 { background: rgba(100,255,0,0.2); } .mood-8 { background: rgba(0,255,65,0.2); }
    .mood-9 { background: rgba(0,255,100,0.25); } .mood-10 { background: rgba(0,255,150,0.3); }
    .legend { display: flex; gap: 1rem; justify-content: center; margin: 1.5rem 0; font-size: 0.8rem; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 0.3rem; }
    .legend-box { width: 16px; height: 16px; border: 1px solid #008f11; }
    .stats { text-align: center; margin-bottom: 1.5rem; color: #008f11; font-size: 0.9rem; }
    .stats span { color: #00ff41; }
    .loading { text-align: center; padding: 3rem; color: #008f11; }
  </style>
</head>
<body>
  <canvas id="matrix-canvas"></canvas>
  <div class="container">
    <header>
      <h1>>_Human.Log<span>_</span></h1>
      <div class="tagline">$ tail -f /var/log/life</div>
      <nav><a href="index.html">~/home</a> <a href="journal.html">~/journal</a></nav>
    </header>

    <div class="status-bar">MOOD TRACKER // ONLINE</div>
    <h2 style="margin-bottom:1.5rem">> Mood Calendar</h2>

    <div class="cal-nav">
      <button id="prev-month">&lt; PREV</button>
      <span id="month-label"></span>
      <button id="next-month">NEXT &gt;</button>
    </div>

    <div class="stats" id="stats"></div>
    <div class="cal-grid" id="cal-grid"></div>

    <div class="legend">
      <div class="legend-item"><div class="legend-box" style="background:rgba(255,0,0,0.25)"></div> Low (1-3)</div>
      <div class="legend-item"><div class="legend-box" style="background:rgba(255,180,0,0.2)"></div> Medium (4-6)</div>
      <div class="legend-item"><div class="legend-box" style="background:rgba(0,255,65,0.2)"></div> High (7-8)</div>
      <div class="legend-item"><div class="legend-box" style="background:rgba(0,255,150,0.3)"></div> Great (9-10)</div>
    </div>

    <footer><p>[root@matrix ~]# track your patterns</p></footer>
  </div>

  <script src="js/matrix-rain.js"></script>
  <script>
    let currentDate = new Date();
    let moodData = {};

    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function getMoodColor(mood) {
      const m = parseInt(mood);
      if (m >= 1 && m <= 3) return 'mood-' + m;
      if (m >= 4 && m <= 6) return 'mood-' + m;
      if (m >= 7 && m <= 10) return 'mood-' + m;
      return '';
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('month-label').textContent = monthNames[month] + ' ' + year;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      let grid = '';
      dayNames.forEach(d => { grid += '<div class="cal-header">' + d + '</div>'; });

      for (let i = 0; i < firstDay; i++) {
        grid += '<div class="cal-day empty"></div>';
      }

      let entries = 0;
      let totalMood = 0;

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        const entry = moodData[dateStr];
        const hasEntry = !!entry;
        if (hasEntry) { entries++; totalMood += parseInt(entry.mood); }
        const moodClass = hasEntry ? getMoodColor(entry.mood) : '';
        const badge = hasEntry ? '<div class="mood-badge">' + entry.mood + '</div>' : '';
        const clickable = hasEntry ? ' has-entry' : '';
        grid += '<div class="cal-day' + moodClass + clickable + '" data-date="' + dateStr + '">';
        grid += '<div class="day-num">' + d + '</div>' + badge;
        grid += '</div>';
      }

      document.getElementById('cal-grid').innerHTML = grid;

      const avg = entries > 0 ? (totalMood / entries).toFixed(1) : '--';
      document.getElementById('stats').innerHTML =
        'Entries this month: <span>' + entries + '</span> | Average mood: <span>' + avg + '/10</span>';

      document.querySelectorAll('.cal-day.has-entry').forEach(el => {
        el.addEventListener('click', () => {
          const date = el.dataset.date;
          const entry = moodData[date];
          if (entry) {
            document.getElementById('month-label').textContent = date + ' — Mood: ' + entry.mood + '/10';
          }
        });
      });
    }

    function loadMonth() {
      fetch('mood-data.json')
        .then(r => r.json())
        .then(data => {
          moodData = {};
          data.forEach(e => { moodData[e.date] = e; });
          renderCalendar();
        })
        .catch(() => {
          document.getElementById('cal-grid').innerHTML = '<div class="loading">No mood data yet. Start journaling!</div>';
        });
    }

    document.getElementById('prev-month').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById('next-month').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    loadMonth();
  </script>
</body>
</html>
